<!DOCTYPE html>
<html>
    <head>
        <title>Welcome!</title>
        <link rel="icon" type="image/x-icon" href="favicon.ico">
        <style>
            body {
    background-color: #0a0a2a;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    max-width: 800px;
    margin: 0 auto;
    padding: 20px;
}

h1 {
    color: #ff6b6b;
    text-align: center;
    font-size: 2em;
    text-shadow: 0 0 5px #ff6b6b;
}

small {
    display: block;
    text-align: center;
    color: #888;
    margin-bottom: 20px;
}

hr {
    border: 1px solid #ff6b6b;
    margin: 20px 0;
}

span {
    font-size: 1.1em;
    margin-right: 10px;
}

button {
    background-color: #1a1a3a;
    color: #ff6b6b;
    border: 1px solid #ff6b6b;
    padding: 5px 15px;
    margin: 5px 0;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-size: 0.9em;
    transition: all 0.2s;
}

button:hover {
    background-color: #ff6b6b;
    color: #0a0a2a;
    box-shadow: 0 0 5px #ff6b6b;
}

a {
    color: #ff6b6b;
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}

br + span {
    display: inline-block;
    margin-top: 5px;
}
        </style>
    </head>
    <body>
        <h1>Welcome!</h1>
        <p>SomeTryhard is a professional GD botter, and just a GD player. Check my pages!</p>
        <a href="/macros">Macros Library</a>
    </body>
</html>
